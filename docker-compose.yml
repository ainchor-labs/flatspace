services:
  flatspace:
    build: .
    image: flatspace:latest
    container_name: flatspace
    restart: unless-stopped
    ports:
      - "7532:7532"
    environment:
      # IMPORTANT: set a long, random secret before exposing this on a network.
      # Without it the server falls back to a public, insecure dev secret.
      # Put FLATSPACE_JWT_SECRET=... in a local .env file (see .env.example).
      FLATSPACE_JWT_SECRET: ${FLATSPACE_JWT_SECRET:-flatspace-dev-secret-change-me}
      # Optional: max upload size in bytes (default 1 GiB).
      # FLATSPACE_MAX_UPLOAD: "1073741824"
    volumes:
      # Bind-mount to a real NAS folder so the SQLite DB (flatspace.sqlite) and
      # uploaded blobs (uploads/) are directly visible and backup-able on the NAS.
      # Keep this on LOCAL NAS storage — SQLite can corrupt over NFS/SMB shares.
      - /volume1/Docker/flatspace/data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:7532/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
